<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝麻杯排球年中邀请赛 | 现场对局</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #007AFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f7;
            -webkit-transform: translate3d(0,0,0);
        }

        /* 优化后的背景层：只占满屏幕，不再需要巨型容器 */
        .bg-wrap {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background-image: url('sprites.png'); /* 只请求这一张图 */
            background-size: 800px 800px;
            background-repeat: repeat;
            animation: moveBg 15s linear infinite;
            will-change: background-position;
        }
        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 800px -800px; }
        }

        /* Frosted Glass Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 50px;
            width: 90%;
            max-width: 1100px;
            text-align: center;
            z-index: 1;
        }

        .title-container { margin-bottom: 40px; }

        h1 {
            font-size: 42px;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #FF3B30, #FF9500, #FFCC00, #34C759, #007AFF, #5856D6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            letter-spacing: -1px;
        }

        .subtitle { font-size: 15px; color: var(--text-secondary); font-weight: 500; letter-spacing: 1px; }

        .stage-badge {
            display: inline-block;
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-blue);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .courts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .court-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .court-title { font-size: 20px; font-weight: 700; margin-bottom: 25px; color: #1d1d1f; }
        .match-display { display: flex; align-items: center; justify-content: space-between; width: 100%;}
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .team-name { font-size: 24px; font-weight: 700; line-height: 1.2; text-align: center; }

        .win-badge {
            background: white;
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .win-badge strong { color: var(--text-main); font-weight: 800;}
        .stat-divider { color: #d1d1d6; }

        .vs-circle {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #f5f5f7, #e5e5ea);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; color: #86868b;
            margin: 0 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex-shrink: 0;
        }

        .referee-badge {
            margin-top: 25px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: #1d1d1f;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
            max-width: 95%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state { color: var(--text-secondary); font-size: 16px; padding: 40px 0; font-weight: 500; }

        /* 移动端完美适配 */
        @media (max-width: 768px) {
            .glass-panel { width: 92%; padding: 25px 15px; border-radius: 30px; overflow-y: auto; max-height: 95vh; }
            .courts-container { grid-template-columns: 1fr; gap: 20px; }
            .court-card { padding: 20px 10px; }
            h1 { font-size: 24px; margin-bottom: 5px; }
            .subtitle { font-size: 11px; line-height: 1.4; margin-bottom: 20px; }
            .stage-badge { font-size: 13px; padding: 6px 14px; margin-bottom: 20px; }
            .team-name { font-size: 18px; }
            .team-box { gap: 8px; }
            .vs-circle { width: 32px; height: 32px; font-size: 12px; margin: 0 5px; }
            .win-badge {
                flex-direction: column;
                gap: 3px;
                padding: 6px 12px;
                font-size: 11px;
                border-radius: 12px;
                width: auto;
            }
            .stat-divider { display: none; }
            .referee-badge {
                font-size: 12px;
                padding: 6px 14px;
                margin-top: 18px;
                white-space: normal;
                line-height: 1.4;
            }
        }
    </style>
</head>
<body>

    <div class="bg-wrap" id="bg-wrap"></div>

    <div class="glass-panel">
        <div class="title-container">
            <h1>芝麻杯排球年中邀请赛</h1>
            <div class="subtitle">Slay the Game, Sees the Same | 场上任撕逼，场下皆诡秘💅</div>
        </div>

        <div class="stage-badge" id="stage-badge">正在加载赛程...</div>

        <div class="courts-container">
            <div class="court-card">
                <div class="court-title">中间场</div>
                <div class="match-display" id="center-court-display"><div class="empty-state">加载中...</div></div>
                <div id="center-court-referee"></div>
            </div>

            <div class="court-card">
                <div class="court-title">边场</div>
                <div class="match-display" id="side-court-display"><div class="empty-state">加载中...</div></div>
                <div id="side-court-referee"></div>
            </div>
        </div>
    </div>

    <script>
        // 2. 裁判映射字典
        const staticReferees = {
            'a1_a2': 'KK/坤 凯歌', 'a3_a4': '智/link 小黑', 'a1_a3': '白/DPR 宇',
            'a2_a4': '赖/RSA KMI', 'a1_a4': '白/RSA KMI', 'a2_a3': '豆/米妮 什么',
            'b1_b2': '鹿/RD BG', 'b3_b4': '铅/倩倩 D林', 'b1_b3': '邓/W BG',
            'b2_b4': '铅/肉 皮卡丘', 'b1_b4': '邓/肉 皮卡丘', 'b2_b3': 'RD/永杰 樊'
        };

        const dynamicReferees = {
            'A1_B4': ['A4', 'B1'], 'A4_B1': ['A1', 'B4'], 'A2_B3': ['A3', 'B2'], 'A3_B2': ['A2', 'B3'],
            'C1_C2': ['C3', 'C4'], 'C3_C4': ['C1', 'C2'], 'C1_C3': ['C2', 'C4'],
            'C2_C4': ['C1', 'C3'], 'C1_C4': ['C2', 'C3'], 'C2_C3': ['C1', 'C4'],
            'D1_D2': ['D3', 'D4'], 'D3_D4': ['D1', 'D2'], 'D1_D3': ['D2', 'D4'],
            'D2_D4': ['D1', 'D3'], 'D1_D4': ['D2', 'D3'], 'D2_D3': ['D1', 'D4']
        };

        // 3. 数据与赛程逻辑
        const stagesConfig = [
            { name: "1、小组循环（25分金球）", center: ['a1_a2','a3_a4','a1_a3','a2_a4','a1_a4','a2_a3'], side: ['b1_b2','b3_b4','b1_b3','b2_b4','b1_b4','b2_b3'], key: "group" },
            { name: "2、交叉淘汰（2分差胜/30分封顶）", center: ['A1_B4', 'A4_B1'], side: ['A2_B3', 'A3_B2'], key: "knockout" },
            { name: "3、排位赛（25分金球）", center: ['C1_C2','C3_C4','C1_C3','C2_C4','C1_C4','C2_C3'], side: ['D1_D2','D3_D4','D1_D3','D2_D4','D1_D4','D2_D3'], key: "placement" }
        ];

        function getScore(data, stageKey, matchId) {
            if (stageKey === 'group') return data.scores.group[matchId];
            if (stageKey === 'knockout') return data.scores.knockout[matchId];
            if (stageKey === 'placement') return data.scores.placement_top[matchId] || data.scores.placement_bot[matchId];
            return null;
        }

        function getTeamName(data, tId) {
            if (!tId) return "待定";
            if (data.teams && data.teams[tId]) return data.teams[tId];
            if (data.calculated && data.calculated.ranks && data.calculated.ranks[tId] && data.calculated.ranks[tId].name) return data.calculated.ranks[tId].name;
            if (data.calculated && data.calculated.placement_teams && data.calculated.placement_teams[tId]) return data.calculated.placement_teams[tId];
            return tId;
        }

        function getRefereeName(data, matchId) {
            if (staticReferees[matchId]) return staticReferees[matchId];
            if (dynamicReferees[matchId]) {
                const [r1, r2] = dynamicReferees[matchId];
                const n1 = getTeamName(data, r1);
                const n2 = getTeamName(data, r2);
                const formatName = (code, name) => name === code ? `${name}队` : name;
                return `${formatName(r1, n1)} / ${formatName(r2, n2)}`;
            }
            return '待定';
        }

        function getWinsInStage(data, stageKey, matchArray, teamId) {
            let teamName = getTeamName(data, teamId);
            if (!teamName || teamName === '待定') return 0;
            let wins = 0;
            for (let m of matchArray) {
                let score = getScore(data, stageKey, m);
                if (score) {
                    let [s1, s2] = score.split('-').map(Number);
                    if (!isNaN(s1) && !isNaN(s2)) {
                        let [t1, t2] = m.split('_');
                        let n1 = getTeamName(data, t1);
                        let n2 = getTeamName(data, t2);
                        if (n1 === teamName && s1 > s2) wins++;
                        if (n2 === teamName && s2 > s1) wins++;
                    }
                }
            }
            return wins;
        }

        function calculateTotalWins(data, teamName) {
            if (!teamName || teamName === '待定' || teamName.length <= 2) return 0;
            let totalWins = 0;
            const allStages = ['group', 'knockout', 'placement_top', 'placement_bot'];
            allStages.forEach(stage => {
                const matches = data.scores[stage] || {};
                for (let matchId in matches) {
                    let score = matches[matchId];
                    if (score) {
                        let [s1, s2] = score.split('-').map(Number);
                        if (!isNaN(s1) && !isNaN(s2)) {
                            let [t1_id, t2_id] = matchId.split('_');
                            let n1 = getTeamName(data, t1_id);
                            let n2 = getTeamName(data, t2_id);
                            if (n1 === teamName && s1 > s2) totalWins++;
                            if (n2 === teamName && s2 > s1) totalWins++;
                        }
                    }
                }
            });
            return totalWins;
        }

        async function fetchAndUpdate() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();

                let currentStage = stagesConfig[0];
                let cMatch = null, sMatch = null;

                for (let s of stagesConfig) {
                    cMatch = s.center.find(m => !getScore(data, s.key, m));
                    sMatch = s.side.find(m => !getScore(data, s.key, m));
                    if (cMatch || sMatch) {
                        currentStage = s;
                        break;
                    }
                }

                if (!cMatch && !sMatch) {
                    document.getElementById('stage-badge').innerText = "比赛已全部结束";
                    document.getElementById('center-court-display').innerHTML = '<div class="empty-state">所有对局已完成</div>';
                    document.getElementById('center-court-referee').innerHTML = '';
                    document.getElementById('side-court-display').innerHTML = '<div class="empty-state">所有对局已完成</div>';
                    document.getElementById('side-court-referee').innerHTML = '';
                    return;
                }

                document.getElementById('stage-badge').innerText = "当前赛程：" + currentStage.name;

                const renderCourt = (containerId, refContainerId, matchId, matchesArray) => {
                    const container = document.getElementById(containerId);
                    const refContainer = document.getElementById(refContainerId);

                    if (!matchId) {
                        container.innerHTML = '<div class="empty-state">本场地当前阶段比赛已结束</div>';
                        refContainer.innerHTML = '';
                        return;
                    }

                    const [t1_id, t2_id] = matchId.split('_');
                    const t1_name = getTeamName(data, t1_id);
                    const t2_name = getTeamName(data, t2_id);

                    const w1_stage = getWinsInStage(data, currentStage.key, matchesArray, t1_id);
                    const w2_stage = getWinsInStage(data, currentStage.key, matchesArray, t2_id);
                    const w1_total = calculateTotalWins(data, t1_name);
                    const w2_total = calculateTotalWins(data, t2_name);

                    container.innerHTML = `
                        <div class="team-box">
                            <div class="team-name">${t1_name}</div>
                            <div class="win-badge">
                                <span>本赛程胜场: <strong>${w1_stage}</strong></span>
                                <span class="stat-divider">|</span>
                                <span>累计总胜场: <strong>${w1_total}</strong></span>
                            </div>
                        </div>
                        <div class="vs-circle">VS</div>
                        <div class="team-box">
                            <div class="team-name">${t2_name}</div>
                            <div class="win-badge">
                                <span>本赛程胜场: <strong>${w2_stage}</strong></span>
                                <span class="stat-divider">|</span>
                                <span>累计总胜场: <strong>${w2_total}</strong></span>
                            </div>
                        </div>
                    `;

                    const referee = getRefereeName(data, matchId);
                    refContainer.innerHTML = `<div class="referee-badge">🏐 当值裁判：${referee}</div>`;
                };

                renderCourt('center-court-display', 'center-court-referee', cMatch, currentStage.center);
                renderCourt('side-court-display', 'side-court-referee', sMatch, currentStage.side);

            } catch (e) {
                console.error("加载数据失败，请确保服务已启动:", e);
            }
        }

        setInterval(fetchAndUpdate, 5000);
        fetchAndUpdate();
    </script>
</body>
</html>
